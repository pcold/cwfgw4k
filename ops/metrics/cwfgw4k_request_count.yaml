# Log-based counter metric — sibling of cwfgw4k_requests. Same source log line,
# same labels, but counts one per request instead of extracting the duration
# distribution. The dashboard's xyChart panels (count of requests over time,
# broken by method/status_class/route) need a scalar-typed metric because
# xyCharts can't rank distributions; distribution percentile panels keep
# using cwfgw4k_requests.
#
# Apply with:
#   gcloud logging metrics create cwfgw4k_request_count \
#     --project=cwfgw4k \
#     --config-from-file=ops/metrics/cwfgw4k_request_count.yaml
name: cwfgw4k_request_count
description: Request count (per method/route/status) extracted from RequestMetricsMiddleware
filter: |
  resource.type="cloud_run_revision"
  AND resource.labels.service_name="cwfgw4k"
  AND textPayload:"cwfgw4k.request"
metricDescriptor:
  metricKind: DELTA
  valueType: INT64
  labels:
    - key: method
      valueType: STRING
      description: HTTP method
    - key: route
      valueType: STRING
      description: Normalized route template (UUIDs → :id, numeric segments → :n, /assets/* bucketed)
    - key: status_class
      valueType: STRING
      description: First digit of the HTTP status code (2, 3, 4, 5)
labelExtractors:
  method: REGEXP_EXTRACT(textPayload, "method=([A-Z]+)")
  route: REGEXP_EXTRACT(textPayload, "route=(\\S+)")
  status_class: REGEXP_EXTRACT(textPayload, "status=([0-9])")
