steps:
  # Compile, run check (tests + ktlint + detekt + kover verify + UI tests),
  # then build the deployable fatJar with the bundled React UI inside it.
  # Repository integration tests use Testcontainers against the Docker
  # socket Cloud Build mounts into every step.
  - name: 'gradle:9-jdk21'
    entrypoint: gradle
    args: ['check', 'buildFatJar', '--no-daemon']

  # Upload backend test + Kover coverage HTML reports plus UI Vitest test +
  # coverage to a public bucket so links in the build log resolve with one
  # click. Output mirrors cwfgw's report layout so dashboards stay uniform.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil -m cp -r build/reports/tests/test/* \
          gs://${_REPORTS_BUCKET}/$BUILD_ID/tests/
        gsutil -m cp -r build/reports/kover/html/* \
          gs://${_REPORTS_BUCKET}/$BUILD_ID/coverage/
        gsutil -m cp -r ui/test-report/* \
          gs://${_REPORTS_BUCKET}/$BUILD_ID/ui-tests/
        gsutil -m cp -r ui/coverage/* \
          gs://${_REPORTS_BUCKET}/$BUILD_ID/ui-coverage/
        echo ""
        echo "=================================================="
        echo "Backend test report:"
        echo "https://storage.googleapis.com/${_REPORTS_BUCKET}/$BUILD_ID/tests/index.html"
        echo "Backend coverage report:"
        echo "https://storage.googleapis.com/${_REPORTS_BUCKET}/$BUILD_ID/coverage/index.html"
        echo "UI test report:"
        echo "https://storage.googleapis.com/${_REPORTS_BUCKET}/$BUILD_ID/ui-tests/index.html"
        echo "UI coverage report:"
        echo "https://storage.googleapis.com/${_REPORTS_BUCKET}/$BUILD_ID/ui-coverage/index.html"
        echo "=================================================="

  # Build the runtime image (just copies the pre-built fatJar).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/cwfgw4k:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/cwfgw4k:latest'
      - '.'

  # Push the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/cwfgw4k']

  # Deploy to Cloud Run. AUTH_SESSION_SECRET is required at boot — the app
  # refuses to start with a blank value — so it ships from a managed secret.
  # DB_JDBC_URL uses the Cloud SQL socket factory; the postgres-socket-factory
  # dependency added in build.gradle.kts is what makes that URL resolve.
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cwfgw4k'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/cwfgw4k:${_TAG}'
      - '--region=${_REGION}'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_SQL_INSTANCE}'
      - '--set-secrets=DB_PASSWORD=cwfgw4k-db-password:latest,AUTH_SESSION_SECRET=cwfgw4k-session-secret:latest,AUTH_ADMIN_PASSWORD=cwfgw4k-admin-password:latest'
      - '--set-env-vars=DB_JDBC_URL=jdbc:postgresql:///${_DB_NAME}?cloudSqlInstance=${PROJECT_ID}:${_REGION}:${_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory,DB_USER=${_DB_USER},DB_SCHEMA=${_DB_SCHEMA},DB_POOL=15,AUTH_ADMIN_USERNAME=admin'
      # Memory: 1Gi container with -Xmx512m in the Dockerfile leaves ~half the
      # box for non-heap JVM (metaspace, JIT code cache, Netty direct buffers,
      # JDBC buffers, thread stacks). Bump container + heap together if real
      # load shows OOM-kill events in Cloud Run logs.
      - '--memory=1Gi'
      # Concurrency: Cloud Run defaults to 80 reqs per instance; with our
      # JVM sizing and a per-instance pool of 10 connections, 20 in-flight
      # requests per instance is the sustainable target — pool slots are
      # released between cache hit / miss / put phases so 2x oversubscription
      # is fine. Cap there and let max-instances absorb spikes.
      - '--concurrency=20'
      # min-instances=1: keep one warm instance at all times (~$45/mo).
      # Was 0 (scale to zero); flipped back after a repeating prod wedge
      # where the first request after an idle period blocked 90s while
      # Hikari refilled stale connections — occasionally hitting Broken
      # Pipe during the TLS handshake to Cloud SQL via the in-process
      # socket factory. Keeping one instance warm sidesteps that whole
      # class of failure. Drop back to 0 only if (a) we're confident
      # the connection-refill path is robust and (b) cost matters more
      # than the cold-start UX.
      - '--min-instances=1'
      # 10 instances × 20 concurrency = 200 in-flight slots — comfortable
      # headroom well beyond the ~50-user target so Cloud Run can scale
      # smoothly through spike traffic. Cloud SQL connection ceiling on
      # db-custom-1-3840 is 200; 10 × DB_POOL=15 = 150 leaves 50 free for
      # psql, Flyway during deploy, and Cloud SQL internal use. If the SQL
      # tier ever shrinks, drop max-instances or DB_POOL to keep total
      # connections ≤ tier max - 10.
      - '--max-instances=10'
      # Request timeout: 90s. Cloud Run's default is 300s; we lower it
      # because no legitimate endpoint has any business taking longer than
      # ~5s end-to-end (cold cache miss with one ESPN call ~1.7s, full
      # report build ~2s). A 300s ceiling means a wedged request sits on
      # an instance burning a concurrency slot and (if it's mid-tx) a DB
      # pool slot for five minutes; 90s is the smallest cap that won't
      # clip cold-start + cache rebuild scenarios while letting the system
      # recover three times faster from any future hang.
      - '--timeout=90'

substitutions:
  _REGION: us-west1
  _REPO: cwfgw4k
  _SQL_INSTANCE: cwfgw4k-prod
  _DB_NAME: cwfgw4k
  _DB_USER: cwfgw4k
  _DB_SCHEMA: cwfgw4k
  _TAG: latest
  _REPORTS_BUCKET: cwfgw4k-cwfgw4k-test-reports

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
