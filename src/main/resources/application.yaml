http:
  host: 0.0.0.0
  port: ${HTTP_PORT:-8080}

db:
  jdbcUrl: ${DB_JDBC_URL:-jdbc:postgresql://localhost:5432/cwfgw4k}
  user: ${DB_USER:-cwfgw4k}
  password: ${DB_PASSWORD:-cwfgw4k}
  schema: ${DB_SCHEMA:-cwfgw4k}
  maxPoolSize: ${DB_POOL:-10}

auth:
  # HMAC key used to sign session cookies. MUST be exported at startup; the app refuses to boot
  # with a blank value. Generate with: openssl rand -hex 32
  sessionSecret: ${AUTH_SESSION_SECRET:-}
  sessionMaxAgeSeconds: ${AUTH_SESSION_MAX_AGE:-86400}
  # If both adminUsername and adminPassword are set AND the users table is empty at startup, an admin
  # user is seeded with these credentials. If either is missing the seeder logs a warning and skips —
  # we never bake in a default password.
  adminUsername: ${AUTH_ADMIN_USERNAME:-}
  adminPassword: ${AUTH_ADMIN_PASSWORD:-}
  # Mark the session cookie `Secure` so browsers only ever send it over HTTPS.
  # Default true = prod-safe. Local development against http://localhost:8080
  # needs AUTH_COOKIE_SECURE=false because Secure cookies aren't accepted on
  # plain-HTTP origins.
  cookieSecure: ${AUTH_COOKIE_SECURE:-true}

cache:
  # Default TTL for cached GET responses. Routes can pass per-call overrides.
  # Start at 5 minutes; tune up if upstream load is still high, down if liveness
  # complaints come in.
  defaultTtlSeconds: ${CACHE_DEFAULT_TTL_SECONDS:-300}
  # Interval for the background coroutine that deletes expired rows. Default
  # matches TTL: at steady state the table holds at most ~1 TTL window of stale
  # rows before sweep clears them.
  sweepIntervalSeconds: ${CACHE_SWEEP_INTERVAL_SECONDS:-300}

espn:
  # In-process Caffeine cache for ESPN scoreboard responses keyed by date.
  # Default 5 minutes — keeps live leaderboards relatively live while
  # absorbing fan-out bursts (multiple report cache keys all needing today's
  # ESPN data dedupe to one ESPN call).
  scoreboardCacheTtlSeconds: ${ESPN_SCOREBOARD_CACHE_TTL_SECONDS:-300}
  scoreboardCacheMaxSize: ${ESPN_SCOREBOARD_CACHE_MAX_SIZE:-256}
